# train_protocol.yaml
#
# The ONE training protocol used for every model in the paper. This file is a
# frozen record of the hyper-parameters; train_fair.py takes them as command
# line flags (defaults below match this file), so the file and the command in
# the README describe the same run. Nothing here is model-specific: the whole
# point of the controlled study is that baseline, +SE, +SSM, PSS-UNet and
# U-Mamba all see exactly these settings.

optimizer:        AdamW
lr:               1.0e-4          # --lr
weight_decay:     1.0e-5          # --weight_decay
scheduler:        CosineAnnealingLR   # NO warm restarts
lr_min:           1.0e-7          # eta_min
epochs:           150             # --epochs
patience:         30              # --patience  (early stop on VAL Dice)
batch_size:       1               # 3D volumes; fixed in data_loader
accumulation_steps: 8             # --accumulation_steps  (effective batch = 8)
loss:             DiceBCE         # 0.5 * BCEWithLogits + 0.5 * (1 - Dice)
amp:              true            # torch.cuda.amp mixed precision
grad_clip:        1.0
deep_supervision: none            # --deep_sup none  (disabled for ALL models)

seeds:            [42, 1, 2]      # --seed ; each model trained once per seed

model_selection:  val_dice        # checkpoint = best VAL Dice; TEST never seen
augmentation:     random_flip     # p=0.5 per axis, axes (x,y,z); nothing else
crop:             depth 155 -> 152 (center)   # done in data_loader / evaluate

data:
  target_shape:   [240, 240, 155]
  normalization:  per-volume min-max to [0, 1]   # no cross-case statistics
  channels:       [flair, t1, t1ce, t2]
  label:          whole tumor (seg > 0), binary
